apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mem0-ingress
  namespace: mem0
  annotations:
    # --- Nginx Ingress ---
    # nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # --- Traefik ---
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  # ingressClassName: nginx
  # ingressClassName: traefik
  tls:
    - hosts:
        - mem0.example.com        # <-- đổi thành domain của bạn
      secretName: mem0-tls-secret  # <-- TLS secret chứa cert + key
  rules:
    - host: mem0.example.com       # <-- đổi thành domain của bạn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-ui
                port:
                  number: 3000
